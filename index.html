<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Simulacro Docente | Prepárate para el concurso</title>
    <link rel="stylesheet" href="css/styles.css">
    <!-- Font Awesome (opcional para iconos) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Cabecera -->
        <header class="main-header">
            <div class="logo">
                <img src="assets/img/logo.svg" alt="Logo Simulacro" class="logo-img">
                <span>Simulacro Docente</span>
            </div>
            <div class="user-info">
                <span id="userName" class="user-name">Invitado</span>
                <button id="logoutBtn" class="btn-icon" aria-label="Cerrar sesión"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </header>

        <!-- Contenido principal -->
        <main class="quiz-area">
            <!-- Barra de progreso -->
            <div class="progress-wrapper">
                <div class="progress-bar-container">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-stats">
                    <span id="currentQuestionIndex">1</span> / <span id="totalQuestions">10</span>
                </div>
            </div>

            <!-- Tarjeta de pregunta -->
            <div class="card question-card">
                <h2 id="questionText" class="question-text">Cargando pregunta...</h2>
                <div class="options-list" id="optionsContainer">
                    <!-- Las opciones se generarán dinámicamente con JS -->
                </div>
                <div id="feedback" class="feedback-area"></div>
                <div class="action-buttons">
                    <button id="checkAnswerBtn" class="btn btn-primary"><i class="fas fa-check"></i> Verificar</button>
                    <button id="nextQuestionBtn" class="btn btn-secondary" disabled><i class="fas fa-arrow-right"></i> Siguiente</button>
                </div>
            </div>

            <!-- Banner de pago (oculto inicialmente) -->
            <div id="paymentBanner" class="payment-banner hidden">
                <p><i class="fas fa-star"></i> Has completado las preguntas gratuitas. <button id="unlockBtn" class="btn-accent">Desbloquear todo por S/19.90</button></p>
            </div>
        </main>

        <!-- Pie de página -->
        <footer class="main-footer">
            <p>&copy; 2025 Simulacro Docente. Todos los derechos reservados.</p>
        </footer>
    </div>

    <script src="js/app.js" type="module"></script>
</body>
</html>
