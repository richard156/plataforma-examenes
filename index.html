<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Simulacro Docente - Concurso Magisterial</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Importar Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <!-- Pantalla de login/registro -->
        <div id="authScreen" class="screen active">
            <h2>🔐 Acceso al Simulacro</h2>
            <div class="tabs">
                <button class="tab-btn active" data-tab="login">Iniciar Sesión</button>
                <button class="tab-btn" data-tab="register">Registrarse</button>
            </div>
            <div id="loginForm" class="form-container active">
                <input type="email" id="loginEmail" placeholder="Correo electrónico" autocomplete="email">
                <input type="password" id="loginPassword" placeholder="Contraseña" autocomplete="current-password">
                <button id="btnLogin">Ingresar</button>
                <p class="error-msg" id="loginError"></p>
            </div>
            <div id="registerForm" class="form-container">
                <input type="email" id="regEmail" placeholder="Correo electrónico" autocomplete="email">
                <input type="password" id="regPassword" placeholder="Contraseña (mínimo 6 caracteres)" autocomplete="new-password">
                <button id="btnRegister">Crear cuenta</button>
                <p class="error-msg" id="regError"></p>
            </div>
        </div>

        <!-- Pantalla del simulacro de preguntas -->
        <div id="quizScreen" class="screen">
            <div class="quiz-header">
                <span>👤 <span id="userEmail"></span></span>
                <span>📊 Pregunta <span id="currentQ">1</span> de <span id="totalQ">0</span></span>
                <button id="logoutBtn">Salir</button>
            </div>
            <div class="progress-bar">
                <div id="progressFill"></div>
            </div>
            <div id="questionText" class="question"></div>
            <div id="optionsContainer" class="options"></div>
            <div id="feedback" class="feedback"></div>
            <div class="nav-buttons">
                <button id="prevBtn" disabled>◀ Anterior</button>
                <button id="nextBtn" disabled>Siguiente ▶</button>
            </div>
            <div id="quizStatus" class="quiz-status"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
